# Dependabot major-version merge executor
#
# This is a companion to the AI review workflow. It is triggered when the
# AI agent adds the "ai-approved-major-update" label to a dependabot PR.
#
# DEFENSE-IN-DEPTH: This workflow does NOT blindly trust the label. Before
# enabling auto-merge it re-verifies every safety condition that the AI
# agent was supposed to check:
#   1. The PR was opened by dependabot[bot].
#   2. The label is exactly "ai-approved-major-update".
#   3. ALL CI check-runs on the PR head SHA have passed (success/skipped).
# If any condition fails, the workflow exits without merging.
#
# NOTE: The existing dependabot-auto-merge.yml already unconditionally
# approves all dependabot PRs, so by the time this workflow runs the PR
# already has an approval. This workflow only needs to enable auto-merge.

name: Dependabot major-version auto-merge

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to enable auto-merge on (must have ai-approved-major-update label)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-major:
    runs-on: ubuntu-latest
    # For label trigger: all four conditions must be true.
    # For manual dispatch: always run (safety checks happen in steps).
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.label.name == 'ai-approved-major-update'
      && github.event.pull_request.user.login == 'dependabot[bot]'
      && github.repository == 'IntelliTect/try'
      && github.actor == 'github-actions[bot]')
    steps:
      # ── 0. Resolve PR URL and SHA (label event vs manual dispatch) ──
      - name: Resolve PR metadata
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            PR_URL=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.html_url')
            PR_AUTHOR=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.user.login')
            PR_SHA=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')
            HAS_LABEL=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '[.labels[].name] | contains(["ai-approved-major-update"])')
            if [ "$PR_AUTHOR" != "dependabot[bot]" ]; then
              echo "::error::PR #$PR_NUMBER author is '$PR_AUTHOR', not dependabot[bot] — refusing."
              exit 1
            fi
            if [ "$HAS_LABEL" != "true" ]; then
              echo "::error::PR #$PR_NUMBER does not have the 'ai-approved-major-update' label — refusing."
              exit 1
            fi
          else
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_SHA="${{ github.event.pull_request.head.sha }}"
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"

      # ── 1. Fetch dependabot PR metadata (label trigger only) ────────
      - name: Dependabot metadata
        id: metadata
        if: github.event_name == 'pull_request'
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # ── 2. Verify semver-major update type (label trigger only) ─────
      - name: Verify semver-major update type
        if: github.event_name == 'pull_request'
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          if [ "$UPDATE_TYPE" != "version-update:semver-major" ]; then
            echo "::error::PR update-type is '$UPDATE_TYPE', not semver-major — refusing to merge."
            exit 1
          fi
          echo "✅ Confirmed semver-major update."

      # ── 3. Verify all CI checks passed ─────────────────────────────
      # IMPORTANT: We exclude this workflow's own job ("auto-merge-major")
      # to avoid a self-referential false positive (our job is in_progress
      # with conclusion=null while this step runs).
      - name: Verify all check-runs passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SHA: ${{ steps.resolve.outputs.pr_sha }}
        run: |
          echo "Fetching check-runs for SHA $PR_SHA..."
          CHECK_RUNS=$(gh api \
            "/repos/${{ github.repository }}/commits/$PR_SHA/check-runs?per_page=100" \
            --jq '[.check_runs[] | select(.name != "auto-merge-major")]')
          TOTAL=$(echo "$CHECK_RUNS" | jq 'length')
          echo "Found $TOTAL check-run(s) (excluding this job)."
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No check-runs found — refusing to merge without CI signals."
            exit 1
          fi
          FAILED=$(echo "$CHECK_RUNS" | jq '[.[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != null)] | length')
          PENDING=$(echo "$CHECK_RUNS" | jq '[.[] | select(.conclusion == null)] | length')
          if [ "$PENDING" -gt 0 ]; then
            echo "::error::$PENDING check-run(s) are still pending — refusing to merge."
            echo "$CHECK_RUNS" | jq '[.[] | select(.conclusion == null)] | .[].name'
            exit 1
          fi
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED check-run(s) did not succeed — refusing to merge."
            echo "$CHECK_RUNS" | jq '[.[] | select(.conclusion != "success" and .conclusion != "skipped")] | .[] | {name, conclusion}'
            exit 1
          fi
          echo "✅ All $TOTAL check-run(s) passed (success or skipped)."

      # ── 4. Enable auto-merge ───────────────────────────────────────
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ steps.resolve.outputs.pr_url }}
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOW }}
